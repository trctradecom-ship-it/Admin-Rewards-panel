<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Rewards Panel</title>

<link rel="stylesheet" href="style.css">

<!-- Ethers -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

<h1>🔥 Rewards Admin Panel</h1>

<button id="connectBtn" class="mainBtn">Connect Wallet</button>

<p id="wallet">Not Connected</p>
<p id="status"></p>

<!-- ===== MENU ===== -->
<div class="menu">
<button onclick="showSection('info')">📊 Info</button>
<button onclick="showSection('reward')">💰 Rewards</button>
<button onclick="showSection('price')">⚙️ Price</button>
</div>

<!-- ===== INFO SECTION ===== -->
<div id="info" class="section active">

<div class="card">
<h2>📊 Contract Info</h2>

<div class="grid">

<div class="cardItem">
TRC Balance<br>
<span id="contractBalance">0</span>
</div>

<div class="cardItem">
Reward Pool<br>
<span id="rewardPool">0</span>
</div>

<div class="cardItem">
Tax Pool<br>
<span id="taxPool">0</span>
</div>

<div class="cardItem">
TRC Price (USD)<br>
<span id="trcPrice">0</span>
</div>

</div>
</div>

<div class="card">
<h2>📈 TRC Balance Chart</h2>

<div class="chartBox">
    <canvas id="chart"></canvas>
</div>

</div>

</div>

<!-- ===== REWARD SECTION ===== -->
<div id="reward" class="section">

<div class="card">
<h2>💰 Reward Controls</h2>

<div class="inputBox">
<input id="depositAmount" placeholder="Deposit TRC amount">
<button id="depositBtn">Deposit Reward</button>
</div>

<div class="inputBox">
<input id="withdrawRewardAmount" placeholder="Withdraw Reward amount">
<button id="withdrawRewardBtn">Withdraw Reward Pool</button>
</div>

<button id="withdrawTaxBtn">Withdraw Tax</button>

</div>

</div>

<!-- ===== PRICE SECTION ===== -->
<div id="price" class="section">

<div class="card">
<h2>⚙️ Price Source</h2>

<div class="priceGrid">

<!-- ICO -->
<div class="priceCard">
<h3>ICO Price</h3>
<button id="setIcoBtn">Use ICO</button>
</div>

<!-- EMA -->
<div class="priceCard">
<h3>EMA Price</h3>
<button id="setEmaBtn">Use EMA</button>
</div>

<!-- MANUAL -->
<div class="priceCard">
<h3>Manual Price</h3>
<input id="manualPrice" placeholder="Enter price">
<button id="setManualBtn">Set Manual</button>
</div>

<!-- DEX -->
<div class="priceCard">
<h3>DEX Price</h3>
<input id="dexAddress" placeholder="Pair address">
<button id="setDexBtn">Set DEX</button>
</div>

<!-- INIT EMA -->
<div class="priceCard">
<h3>Initialize EMA</h3>
<button id="initEmaBtn">Init EMA</button>
</div>

</div>

</div>

</div>

</div>

<!-- ===== SECTION SWITCH SCRIPT ===== -->
<script>
function showSection(id){
    document.querySelectorAll('.section').forEach(sec=>{
        sec.classList.remove('active');
    });
    document.getElementById(id).classList.add('active');
}
</script>

<!-- APP JS -->
<script src="app.js"></script>

</body>
</html>
